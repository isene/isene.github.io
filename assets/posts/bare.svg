<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="asm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00cc88"/>
      <stop offset="100%" style="stop-color:#008855"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
    @keyframes glow { 0%,100% { opacity: 0.2; } 50% { opacity: 0.5; } }
    .cursor { animation: blink 1.2s step-end infinite; }
    .scanline { animation: glow 3s ease-in-out infinite; }
  </style>
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#asm)" stroke-width="3"/>
  <!-- Terminal window -->
  <rect x="44" y="52" width="168" height="120" rx="6" fill="#0d0d1a" stroke="#00cc88" stroke-width="1.5" opacity="0.9"/>
  <!-- Title bar -->
  <rect x="44" y="52" width="168" height="14" rx="6" fill="#1a2a22" opacity="0.8"/>
  <circle cx="56" cy="59" r="3" fill="#ff5f56" opacity="0.7"/>
  <circle cx="66" cy="59" r="3" fill="#ffbd2e" opacity="0.7"/>
  <circle cx="76" cy="59" r="3" fill="#27c93f" opacity="0.7"/>
  <!-- Prompt lines -->
  <text x="52" y="82" font-family="monospace" font-size="8" fill="#00cc88" opacity="0.8">user@host:~$</text>
  <text x="52" y="94" font-family="monospace" font-size="8" fill="#aab" opacity="0.5">ls -la /bin</text>
  <text x="52" y="106" font-family="monospace" font-size="8" fill="#00cc88" opacity="0.8">user@host:~$</text>
  <text x="52" y="118" font-family="monospace" font-size="8" fill="#aab" opacity="0.5">echo $PATH</text>
  <!-- Active prompt -->
  <text x="52" y="130" font-family="monospace" font-size="8" fill="#00cc88">user@host:~$</text>
  <!-- Blinking cursor -->
  <rect class="cursor" x="120" y="123" width="5" height="9" fill="#00cc88"/>
  <!-- Scanline effect -->
  <rect class="scanline" x="44" y="66" width="168" height="106" rx="4" fill="#00cc88" opacity="0.03"/>
  <!-- Annotations -->
  <text x="52" y="150" font-family="monospace" font-size="7" fill="#00cc88" opacity="0.4">syscall</text>
  <text x="155" y="150" font-family="monospace" font-size="7" fill="#00cc88" opacity="0.4">x86_64</text>
  <!-- Label -->
  <text x="128" y="206" font-family="monospace" font-size="24" font-weight="bold" fill="url(#asm)" text-anchor="middle" letter-spacing="3">bare</text>
  <text x="128" y="224" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">pure assembly shell</text>
</svg>
