<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" style="font-family: 'Courier New', monospace;">
  <defs>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cc342d;stop-opacity:0.6"/>
      <stop offset="85%" style="stop-color:#cc342d;stop-opacity:0.3"/>
      <stop offset="88%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="600" fill="url(#rustGrad)"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#f74c00" font-size="28" font-weight="bold">
    Fe2O3: The Rust Terminal Suite
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>
  <text x="600" y="70" text-anchor="middle" fill="#888" font-size="14">
    9 months, 1,224 commits, 30,000 lines of Rust, 0 lines read
    <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
  </text>

  <!-- Timeline line -->
  <line x1="60" y1="130" x2="1140" y2="130" stroke="url(#lineGrad)" stroke-width="3">
    <animate attributeName="x2" from="60" to="1140" dur="2s" fill="freeze"/>
  </line>

  <!-- Month markers: Jul 2025 = 60, Apr 7 2026 = 1140. 9.2 months, ~117px per month -->
  <g fill="#555" font-size="11" text-anchor="middle">
    <text x="60" y="155">Jul 25</text>
    <text x="177" y="155">Aug</text>
    <text x="294" y="155">Sep</text>
    <text x="411" y="155">Oct</text>
    <text x="528" y="155">Nov</text>
    <text x="645" y="155">Dec</text>
    <text x="762" y="155">Jan 26</text>
    <text x="879" y="155">Feb</text>
    <text x="996" y="155">Mar</text>
    <text x="1140" y="155">Apr</text>
  </g>

  <!-- Ruby era bar: Jul 2025 through late March 2026 (x=60 to x=1030) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
    <rect x="50" y="170" width="990" height="28" rx="5" fill="#cc342d" opacity="0.12"/>
    <text x="530" y="189" text-anchor="middle" fill="#cc342d" font-size="13" font-weight="bold">Ruby Era: rsh, rcurses, RTFM, Heathrow, Timely, Brrowser</text>
  </g>

  <!-- Fe2O3 era bar: late March to Apr 7 (x=1030 to x=1140) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="2.5s" fill="freeze"/>
    <rect x="1020" y="170" width="130" height="28" rx="5" fill="#f74c00" opacity="0.2">
      <animate attributeName="opacity" values="0.1;0.25;0.1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="1085" y="189" text-anchor="middle" fill="#f74c00" font-size="13" font-weight="bold">Fe2O3</text>
  </g>

  <!-- Ruby milestones along the timeline -->
  <!-- rsh: Jul 2025 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1s" fill="freeze"/>
    <circle cx="60" cy="130" r="6" fill="#cc342d" filter="url(#glow)"/>
    <line x1="60" y1="136" x2="60" y2="215" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="60" y="230" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">rsh</text>
    <text x="60" y="243" text-anchor="middle" fill="#777" font-size="9">66 commits</text>
  </g>

  <!-- rcurses: Aug -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.2s" fill="freeze"/>
    <circle cx="177" cy="130" r="5" fill="#cc342d"/>
    <line x1="177" y1="136" x2="177" y2="265" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="177" y="280" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">rcurses</text>
    <text x="177" y="293" text-anchor="middle" fill="#777" font-size="9">45 commits</text>
  </g>

  <!-- RTFM: Sep -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.4s" fill="freeze"/>
    <circle cx="294" cy="130" r="7" fill="#cc342d" filter="url(#glow)"/>
    <line x1="294" y1="136" x2="294" y2="215" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="294" y="230" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">RTFM</text>
    <text x="294" y="243" text-anchor="middle" fill="#777" font-size="9">85 commits</text>
  </g>

  <!-- Amar-Tools: Oct -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.5s" fill="freeze"/>
    <circle cx="411" cy="130" r="7" fill="#cc342d" filter="url(#glow)"/>
    <line x1="411" y1="136" x2="411" y2="265" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="411" y="280" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">Amar-Tools</text>
    <text x="411" y="293" text-anchor="middle" fill="#777" font-size="9">241 commits</text>
  </g>

  <!-- Brrowser: Nov -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.6s" fill="freeze"/>
    <circle cx="528" cy="130" r="5" fill="#cc342d"/>
    <line x1="528" y1="136" x2="528" y2="215" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="528" y="230" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">Brrowser</text>
    <text x="528" y="243" text-anchor="middle" fill="#777" font-size="9">55 commits</text>
  </g>

  <!-- Heathrow: Dec-Jan -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="1.8s" fill="freeze"/>
    <circle cx="700" cy="130" r="7" fill="#cc342d" filter="url(#glow)"/>
    <line x1="700" y1="136" x2="700" y2="265" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="700" y="280" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">Heathrow</text>
    <text x="700" y="293" text-anchor="middle" fill="#777" font-size="9">26 commits</text>
  </g>

  <!-- Timely: Feb -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2s" fill="freeze"/>
    <circle cx="879" cy="130" r="6" fill="#cc342d"/>
    <line x1="879" y1="136" x2="879" y2="215" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="879" y="230" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">Timely</text>
    <text x="879" y="243" text-anchor="middle" fill="#777" font-size="9">70 commits</text>
  </g>

  <!-- XRPN: scattered -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.2s" fill="freeze"/>
    <circle cx="960" cy="130" r="4" fill="#cc342d"/>
    <line x1="960" y1="136" x2="960" y2="265" stroke="#cc342d" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="960" y="280" text-anchor="middle" fill="#cc342d" font-size="11" font-weight="bold">XRPN</text>
    <text x="960" y="293" text-anchor="middle" fill="#777" font-size="9">25 commits</text>
  </g>

  <!-- THE PIVOT marker -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.8s" fill="freeze"/>
    <line x1="1030" y1="105" x2="1030" y2="155" stroke="#f74c00" stroke-width="2" stroke-dasharray="4,2"/>
    <text x="1030" y="100" text-anchor="middle" fill="#f74c00" font-size="10">PIVOT</text>
  </g>

  <!-- Fe2O3 Rust milestones (compressed into late Mar - early Apr) -->
  <!-- Rush + Crust + Glow -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.2s" fill="freeze"/>
    <circle cx="1045" cy="130" r="6" fill="#f74c00" filter="url(#glow)">
      <animate attributeName="r" values="4;7;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="1045" y1="136" x2="1045" y2="320" stroke="#f74c00" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1045" y="335" text-anchor="middle" fill="#f74c00" font-size="10" font-weight="bold">Rush</text>
    <text x="1045" y="347" text-anchor="middle" fill="#888" font-size="8">Crust, Glow</text>
    <text x="1045" y="359" text-anchor="middle" fill="#666" font-size="8">6,240 lines</text>
  </g>

  <!-- Pointer + Scroll -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.5s" fill="freeze"/>
    <circle cx="1070" cy="130" r="5" fill="#f74c00"/>
    <line x1="1070" y1="136" x2="1070" y2="215" stroke="#f74c00" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1070" y="230" text-anchor="middle" fill="#f74c00" font-size="10" font-weight="bold">Pointer</text>
    <text x="1070" y="242" text-anchor="middle" fill="#888" font-size="8">Scroll</text>
    <text x="1070" y="254" text-anchor="middle" fill="#666" font-size="8">7,222 lines</text>
  </g>

  <!-- Kastrup -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.8s" fill="freeze"/>
    <circle cx="1100" cy="130" r="7" fill="#f74c00" filter="url(#glow)">
      <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="1100" y1="136" x2="1100" y2="320" stroke="#f74c00" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1100" y="335" text-anchor="middle" fill="#f74c00" font-size="10" font-weight="bold">Kastrup</text>
    <text x="1100" y="347" text-anchor="middle" fill="#888" font-size="8">8,075 lines</text>
    <text x="1100" y="359" text-anchor="middle" fill="#666" font-size="8">Messaging</text>
  </g>

  <!-- Tock -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.3s" begin="4.1s" fill="freeze"/>
    <circle cx="1130" cy="130" r="7" fill="#f39c12" filter="url(#glow)">
      <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="1130" y1="136" x2="1130" y2="215" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="1130" y="230" text-anchor="middle" fill="#f39c12" font-size="10" font-weight="bold">Tock</text>
    <text x="1130" y="242" text-anchor="middle" fill="#888" font-size="8">6,982 lines</text>
    <text x="1130" y="254" text-anchor="middle" fill="#666" font-size="8">Calendar</text>
  </g>

  <!-- Stats boxes -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="1s" begin="4.5s" fill="freeze"/>

    <rect x="80" y="440" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#f74c00" stroke-width="1.5"/>
    <text x="180" y="465" text-anchor="middle" fill="#f74c00" font-size="28" font-weight="bold">1,224</text>
    <text x="180" y="485" text-anchor="middle" fill="#888" font-size="12">total commits</text>
    <text x="180" y="505" text-anchor="middle" fill="#555" font-size="10">across 97 repos</text>

    <rect x="310" y="440" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#f74c00" stroke-width="1.5"/>
    <text x="410" y="465" text-anchor="middle" fill="#f74c00" font-size="28" font-weight="bold">29,680</text>
    <text x="410" y="485" text-anchor="middle" fill="#888" font-size="12">lines of Rust</text>
    <text x="410" y="505" text-anchor="middle" fill="#555" font-size="10">9 Fe2O3 projects</text>

    <rect x="540" y="440" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#f74c00" stroke-width="1.5"/>
    <text x="640" y="465" text-anchor="middle" fill="#f74c00" font-size="28" font-weight="bold">~2 weeks</text>
    <text x="640" y="485" text-anchor="middle" fill="#888" font-size="12">Fe2O3 total build time</text>
    <text x="640" y="505" text-anchor="middle" fill="#555" font-size="10">estimated: 5 years</text>

    <rect x="770" y="440" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#f74c00" stroke-width="1.5"/>
    <text x="870" y="465" text-anchor="middle" fill="#f74c00" font-size="28" font-weight="bold">0</text>
    <text x="870" y="485" text-anchor="middle" fill="#888" font-size="12">lines of code read</text>
    <text x="870" y="505" text-anchor="middle" fill="#555" font-size="10">by the human</text>

    <rect x="1000" y="440" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#f39c12" stroke-width="1.5"/>
    <text x="1090" y="465" text-anchor="middle" fill="#f39c12" font-size="28" font-weight="bold">200x</text>
    <text x="1090" y="485" text-anchor="middle" fill="#888" font-size="12">speed increase</text>
    <text x="1090" y="505" text-anchor="middle" fill="#555" font-size="10">3x quality</text>
  </g>

  <!-- Bottom tagline -->
  <text x="600" y="565" text-anchor="middle" fill="#444" font-size="12">
    9 months of Ruby, then 2 weeks of Rust. Zero Rust experience. Powered by Claude Code.
    <animate attributeName="opacity" values="0;1" dur="1s" begin="5s" fill="freeze"/>
  </text>
</svg>
